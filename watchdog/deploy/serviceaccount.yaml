apiVersion: v1
kind: ServiceAccount
metadata:
  name: watchdog
  namespace: watchdog
  labels:
    app.kubernetes.io/name: watchdog
    app.kubernetes.io/part-of: grip-watchdog
  annotations:
    # GCS workload identity for Tier 2 snapshot-cli fallback.
    # Replace with the actual IAM role ARN that has GCS read access to
    # the snapshot bucket (prod-master-console-cluster-snapshots-snapshotstore).
    # For EKS:
    #   eks.amazonaws.com/role-arn: "arn:aws:iam::ACCOUNT_ID:role/watchdog-gcs-reader"
    # For GKE (workload identity):
    #   iam.gke.io/gcp-service-account: "watchdog-reader@PROJECT.iam.gserviceaccount.com"
    app.kubernetes.io/managed-by: "watchdog"
automountServiceAccountToken: false
