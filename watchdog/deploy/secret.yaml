apiVersion: v1
kind: Secret
metadata:
  name: watchdog-secrets
  namespace: watchdog
  labels:
    app.kubernetes.io/name: watchdog
    app.kubernetes.io/part-of: grip-watchdog
type: Opaque
stringData:
  # ── CAST AI Auth ──────────────────────────────────────────────
  # Primary: API key (never expires, used for public API fallback)
  CASTAI_API_KEY: "REPLACE_ME"

  # MCP auth: JWT token (expires every 12h — refresh via browser_login.py)
  # If empty, watchdog falls back to public API only (loses snapshot/Loki)
  CASTAI_JWT_TOKEN: ""

  # IAP cookie value for MCP server (also expires with JWT)
  CASTAI_IAP_TOKEN: ""

  # ── Slack ─────────────────────────────────────────────────────
  SLACK_WEBHOOK_URL: "REPLACE_ME"

  # ── LLM ───────────────────────────────────────────────────────
  # Falls back to CASTAI_API_KEY if not set
  LLM_API_KEY: ""
